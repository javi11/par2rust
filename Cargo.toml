[package]
name = "par2rust"
version = "0.1.0"
edition = "2021"
rust-version = "1.74"
description = "PAR2 file create-only port of par2cmdline in Rust"
license = "GPL-2.0-or-later"

[dependencies]
md-5 = "0.10"
crc32fast = "1.4"
clap = { version = "4", features = ["derive"] }
thiserror = "1"
cpufeatures = "0.2"

[dev-dependencies]
tempfile = "3"

[profile.release]
opt-level = 3
lto = "thin"
codegen-units = 1
